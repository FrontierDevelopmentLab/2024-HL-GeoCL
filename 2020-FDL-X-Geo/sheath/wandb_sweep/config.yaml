program: main_train_xgboost.py
method: bayes
metric:
  name: val_loss
  goal: minimize
parameters:
  eta:
      distribution: uniform
      min: 0.1
      max: 0.9
  gamma:
      distribution: uniform
      min: 0
      max: 20
  max_depth:
    distribution: int_uniform
    min: 12
    max: 200
  subsample:
    distribution: categorical
    values:
      - 0.2
      - 0.5
      - 0.8
      - 1.0
  reg_alpha:
    distribution: uniform
    min: 0
    max: 10
  early_stopping_rounds:
    distribution: categorical
    values:
      - 10
      - 30
      - 50
      - 80
  loss:
    distribution: categorical
    values:
      - 'reg:pseudohubererror'
      - 'reg:squarederror'
